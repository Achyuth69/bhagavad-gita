services:
  # Backend API Service
  - type: web
    name: bhagavad-gita-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install --no-cache-dir --upgrade pip && pip install --no-cache-dir -r requirements.txt
    startCommand: cd backend && uvicorn backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    
  # Frontend Static Site
  - type: web
    name: bhagavad-gita-frontend
    env: static
    buildCommand: echo "No build needed"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
